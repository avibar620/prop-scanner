name: Scrape Belgian Properties

# Runs Zimmo + Immoweb (with Playwright) every 6 hours against the production
# Neon DB. Requires repo secrets:
#   DATABASE_URL       — Neon connection string
#   ANTHROPIC_API_KEY  — for AI re-analysis (optional, picked up by ai.ts)
#
# Add these at: https://github.com/avibar620/prop-scanner/settings/secrets/actions
# Manual trigger: Actions tab → "Scrape Belgian Properties" → Run workflow.

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6h at minute 0
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # headroom for 40 areas × pagination + Immoweb Playwright runs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Install Playwright browser (chromium only)
        # --with-deps installs the system libraries Chromium needs on Ubuntu.
        run: npx playwright install --with-deps chromium
      - name: Scrape Zimmo + Immoweb + recompute market averages
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          USE_PLAYWRIGHT: "true"  # turns on Immoweb scraper
        run: npx tsx scripts/scrape-and-replace.mjs
